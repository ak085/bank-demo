services:
  bank-demo:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-demo
    restart: unless-stopped
    ports:
      - "8029:80"      # All interfaces — Tailscale (100.125.242.78) + LAN (10.230.93.50)
    depends_on:
      - bank-demo-backend
    networks:
      - aihvac-net
      - bank-internal

  bank-demo-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-demo-backend
    restart: unless-stopped
    environment:
      - TZ=Asia/Singapore
    volumes:
      - ./data:/data
    networks:
      - bank-internal

networks:
  aihvac-net:
    external: true
  bank-internal:
    driver: bridge
